name: Wheels

on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build_wheels:
    name: "${{ matrix.label }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux x86_64 wheels
            cibw_archs: x86_64
            cibw_environment_macos: ""
          - os: windows-latest
            label: Windows x86_64 wheels
            cibw_archs: AMD64
            cibw_environment_macos: ""
          - os: macos-15-intel
            label: macOS x86_64 wheels
            cibw_archs: x86_64
            cibw_environment_macos: ""
          - os: macos-14
            label: macOS arm64 wheels (macOS 14+)
            cibw_archs: arm64
            cibw_environment_macos: "MACOSX_DEPLOYMENT_TARGET=14.0 CMAKE_OSX_DEPLOYMENT_TARGET=14.0"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install macOS OpenMP runtime
        if: startsWith(matrix.os, 'macos')
        run: brew install libomp

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux* *_aarch64 *_ppc64le *_s390x *_universal2"
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_ENVIRONMENT_MACOS: ${{ matrix.cibw_environment_macos }}
          CIBW_TEST_REQUIRES: "pytest"
          CIBW_TEST_COMMAND: "pytest {project}/tests"
          CIBW_BEFORE_BUILD_MACOS: "python -m pip install delocate"
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: "delocate-wheel -w {dest_dir} -v {wheel}"
          CIBW_BEFORE_BUILD_WINDOWS: "python -m pip install delvewheel"
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: "python -m delvewheel repair -w {dest_dir} {wheel}"

      - uses: actions/upload-artifact@v4
        with:
          name: "wheels-${{ matrix.cibw_archs }}"
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build sdist
        run: python -m pip install build && python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - build_wheels
      - build_sdist
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/omnigbdt
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          path: dist
          name: sdist

      - uses: pypa/gh-action-pypi-publish@release/v1
